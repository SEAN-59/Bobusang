name: bobusang

services:
  release_app:
    image: ${BOBUSANG_RELEASE_IMAGE:?Set BOBUSANG_RELEASE_IMAGE in .env}
    container_name: ${BOBUSANG_RELEASE_APP_CONTAINER_NAME:?Set BOBUSANG_RELEASE_APP_CONTAINER_NAME in .env}
    restart: unless-stopped
    env_file:
      - ./app/app.env
    environment:
      PORT: "${BOBUSANG_RELEASE_CONTAINER_PORT:?Set BOBUSANG_RELEASE_CONTAINER_PORT in .env}"
    ports:
      - "${BOBUSANG_BIND_ADDR:?Set BOBUSANG_BIND_ADDR in .env}:${BOBUSANG_RELEASE_HOST_PORT:?Set BOBUSANG_RELEASE_HOST_PORT in .env}:${BOBUSANG_RELEASE_CONTAINER_PORT:?Set BOBUSANG_RELEASE_CONTAINER_PORT in .env}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bobusang
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dev_app:
    image: ${BOBUSANG_DEV_IMAGE:?Set BOBUSANG_DEV_IMAGE in .env}
    container_name: ${BOBUSANG_DEV_APP_CONTAINER_NAME:?Set BOBUSANG_DEV_APP_CONTAINER_NAME in .env}
    restart: unless-stopped
    env_file:
      - ./dev_app/app.env
    environment:
      PORT: "${BOBUSANG_DEV_CONTAINER_PORT:?Set BOBUSANG_DEV_CONTAINER_PORT in .env}"
    ports:
      - "${BOBUSANG_BIND_ADDR:?Set BOBUSANG_BIND_ADDR in .env}:${BOBUSANG_DEV_HOST_PORT:?Set BOBUSANG_DEV_HOST_PORT in .env}:${BOBUSANG_DEV_CONTAINER_PORT:?Set BOBUSANG_DEV_CONTAINER_PORT in .env}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bobusang
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:${POSTGRES_IMAGE_TAG:?Set POSTGRES_IMAGE_TAG in .env}
    container_name: ${BOBUSANG_DB_CONTAINER_NAME:?Set BOBUSANG_DB_CONTAINER_NAME in .env}
    restart: unless-stopped
    env_file:
      - ./db/db.env
    environment:
      POSTGRES_CONTAINER_PORT: "${POSTGRES_CONTAINER_PORT:?Set POSTGRES_CONTAINER_PORT in .env}"
    command: ["postgres", "-c", "port=${POSTGRES_CONTAINER_PORT:?Set POSTGRES_CONTAINER_PORT in .env}"]
    volumes:
      - ./db/data:/var/lib/postgresql/data
    ports:
      - "${BOBUSANG_DB_BIND_ADDR:?Set BOBUSANG_DB_BIND_ADDR in .env}:${POSTGRES_HOST_PORT:?Set POSTGRES_HOST_PORT in .env}:${POSTGRES_CONTAINER_PORT:?Set POSTGRES_CONTAINER_PORT in .env}"
    networks:
      - bobusang
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p $${POSTGRES_CONTAINER_PORT} -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  bobusang:
    name: ${BOBUSANG_NETWORK_NAME:?Set BOBUSANG_NETWORK_NAME in .env}
