name: Develop Deploy

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: develop-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: bobusang-core

jobs:
  build-and-push:
    name: Build and push develop image
    runs-on: ubuntu-latest
    if: "${{ github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'deploy: develop') }}"
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image
        shell: bash
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${REGISTRY}/${owner}/${IMAGE_REPOSITORY}"
          short_sha="${MERGE_SHA::12}"
          image_ref="${image}:develop-${short_sha}"

          {
            echo "image_ref=${image_ref}"
            echo "tags<<EOF"
            echo "${image}:develop"
            echo "${image}:develop-${short_sha}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Bobusang Core
            org.opencontainers.image.description=Bobusang core BO and API server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.merge_commit_sha }}
            org.opencontainers.image.version=develop-${{ github.event.pull_request.merge_commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy NAS dev compose
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "${HOME}/.ssh"
          install -m 600 /dev/null "${HOME}/.ssh/bobusang_deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/bobusang_deploy_key"
          ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Deploy compose service
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          COMPOSE_PATH: ${{ secrets.COMPOSE_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SERVICE: dev_app
          IMAGE_VAR: BOBUSANG_DEV_IMAGE
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          ssh -i "${HOME}/.ssh/bobusang_deploy_key" -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "bash -s" << EOF
          set -euo pipefail

          COMPOSE_PATH='${COMPOSE_PATH}'
          GHCR_USERNAME='${GHCR_USERNAME}'
          GHCR_TOKEN='${GHCR_TOKEN}'
          SERVICE='${SERVICE}'
          IMAGE_VAR='${IMAGE_VAR}'
          IMAGE_REF='${IMAGE_REF}'

          PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:\${PATH:-}"
          DOCKER_BIN="\$(command -v docker || true)"
          if [[ -z "\${DOCKER_BIN}" ]]; then
            for candidate in /usr/local/bin/docker /usr/bin/docker /bin/docker; do
              if [[ -x "\${candidate}" ]]; then
                DOCKER_BIN="\${candidate}"
                break
              fi
            done
          fi

          if [[ -z "\${DOCKER_BIN}" ]]; then
            echo "docker command not found on NAS. Install Docker or expose it in PATH." >&2
            exit 127
          fi

          cd "\${COMPOSE_PATH}"
          printf '%s\n' "\${GHCR_TOKEN}" | "\${DOCKER_BIN}" login ghcr.io -u "\${GHCR_USERNAME}" --password-stdin

          if [[ -f .env && -n "\$(grep -E "^\${IMAGE_VAR}=" .env || true)" ]]; then
            tmp_file="\$(mktemp)"
            awk -v key="\${IMAGE_VAR}" -v value="\${IMAGE_REF}" '
              BEGIN { updated = 0 }
              \$0 ~ "^" key "=" { print key "=" value; updated = 1; next }
              { print }
              END { if (!updated) print key "=" value }
            ' .env > "\${tmp_file}"
            mv "\${tmp_file}" .env
          else
            printf '\n%s=%s\n' "\${IMAGE_VAR}" "\${IMAGE_REF}" >> .env
          fi

          "\${DOCKER_BIN}" compose -f compose.yaml pull "\${SERVICE}"
          "\${DOCKER_BIN}" compose -f compose.yaml up -d "\${SERVICE}"
          "\${DOCKER_BIN}" compose -f compose.yaml ps "\${SERVICE}"
          EOF
