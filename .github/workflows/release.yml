name: Release Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: bobusang-core

jobs:
  build-and-push:
    name: Build and push GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version="${tag_name#v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="${REGISTRY}/${owner}/${IMAGE_REPOSITORY}"

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image}:${tag_name}"
            echo "${image}:${version}"
            if [[ "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Bobusang Core
            org.opencontainers.image.description=Bobusang core BO and API server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
