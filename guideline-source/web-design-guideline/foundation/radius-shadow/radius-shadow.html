<section class="gl-section" id="s-radius">
  <div class="gl-section-header">
    <p class="gl-section-label">Foundation</p>
    <h2 class="gl-section-title">Radius &amp; Shadow</h2>
    <p class="gl-section-desc">그림자는 최소한으로 사용합니다. 경계는 border 또는 여백으로 표현하는 것을 권장합니다.</p>
  </div>
  <div class="gl-sub">
    <p class="gl-sub-title">Border Radius</p>
    <div class="radius-grid">
      <div class="radius-item"><div class="radius-box" style="border-radius:var(--radius-sm)"></div><div class="radius-label">sm / 4px</div></div>
      <div class="radius-item"><div class="radius-box" style="border-radius:var(--radius-md)"></div><div class="radius-label">md / 8px</div></div>
      <div class="radius-item"><div class="radius-box" style="border-radius:var(--radius-lg)"></div><div class="radius-label">lg / 12px</div></div>
      <div class="radius-item"><div class="radius-box" style="border-radius:var(--radius-xl)"></div><div class="radius-label">xl / 16px</div></div>
      <div class="radius-item"><div class="radius-box" style="border-radius:var(--radius-2xl)"></div><div class="radius-label">2xl / 24px</div></div>
      <div class="radius-item"><div class="radius-box" style="border-radius:var(--radius-full)"></div><div class="radius-label">full</div></div>
    </div>
  </div>
  <div class="gl-sub">
    <p class="gl-sub-title">Shadow</p>
    <div class="shadow-grid">
      <div class="shadow-item"><div class="shadow-box" style="border:1px solid var(--color-border)"></div><div class="shadow-label">none (border)</div></div>
      <div class="shadow-item"><div class="shadow-box" style="box-shadow:var(--shadow-xs)"></div><div class="shadow-label">xs</div></div>
      <div class="shadow-item"><div class="shadow-box" style="box-shadow:var(--shadow-sm)"></div><div class="shadow-label">sm</div></div>
      <div class="shadow-item"><div class="shadow-box" style="box-shadow:var(--shadow-md)"></div><div class="shadow-label">md</div></div>
      <div class="shadow-item"><div class="shadow-box" style="box-shadow:var(--shadow-lg)"></div><div class="shadow-label">lg</div></div>
      <div class="shadow-item"><div class="shadow-box" style="box-shadow:var(--shadow-xl)"></div><div class="shadow-label">xl</div></div>
    </div>
  </div>
</section>
