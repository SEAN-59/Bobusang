<section class="gl-section" id="s-card">
  <div class="gl-section-header"><p class="gl-section-label">Component</p><h2 class="gl-section-title">Card</h2></div>
  <div class="preview"><div class="preview-label">Pattern</div><div class="preview-body gray">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--space-4)">
      <div class="card">
        <p class="card-title">기본 카드</p>
        <p class="card-desc">카드 내부 설명 텍스트입니다. 일반적인 콘텐츠 컨테이너로 사용됩니다.</p>
        <div class="card-footer"><button class="btn btn-sm btn-ghost">취소</button><button class="btn btn-sm btn-primary">확인</button></div>
      </div>
      <div class="card">
        <span class="badge badge-success" style="margin-bottom:var(--space-2);align-self:flex-start">Active</span>
        <p class="card-title">뱃지 포함 카드</p>
        <p class="card-desc">뱃지는 타이틀 위에 배치하고 좌측 정렬을 맞춥니다.</p>
        <div class="card-footer"><button class="btn btn-sm btn-ghost">취소</button><button class="btn btn-sm btn-primary">확인</button></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--space-4);margin-top:var(--space-4)">
      <!-- 기본 이미지 카드 -->
      <div class="card card-image">
        <div class="card-img-wrap">
          <div class="card-img-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="card-body">
          <p class="card-title">이미지 카드</p>
          <p class="card-desc">상단 이미지가 16:9 비율로 카드 너비에 꽉 채워집니다.</p>
          <div class="card-footer"><button class="btn btn-sm btn-ghost">취소</button><button class="btn btn-sm btn-primary">확인</button></div>
        </div>
      </div>
      <!-- 뱃지 포함 이미지 카드 -->
      <div class="card card-image">
        <div class="card-img-wrap">
          <div class="card-img-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="card-img-badge badge badge-accent">New</span>
        </div>
        <div class="card-body">
          <p class="card-title">이미지 + 뱃지 카드</p>
          <p class="card-desc">이미지 위에 뱃지를 오버레이로 올릴 수도 있습니다.</p>
          <div class="card-footer"><button class="btn btn-sm btn-ghost">취소</button><button class="btn btn-sm btn-primary">확인</button></div>
        </div>
      </div>
    </div>
  </div></div>
</section>
