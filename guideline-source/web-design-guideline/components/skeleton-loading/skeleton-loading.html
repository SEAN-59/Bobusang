<section class="gl-section" id="s-skeleton">
  <div class="gl-section-header"><p class="gl-section-label">Component</p><h2 class="gl-section-title">Skeleton / Loading</h2></div>
  <div class="preview"><div class="preview-label">Card Skeleton</div><div class="preview-body gray">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-4)">
      <div class="skeleton-card">
        <div class="skeleton skeleton-thumb"></div>
        <div class="skeleton skeleton-title" style="width:70%"></div>
        <div class="skeleton skeleton-text" style="width:100%"></div>
        <div class="skeleton skeleton-text" style="width:85%"></div>
        <div class="skeleton skeleton-text" style="width:60%"></div>
      </div>
      <div class="skeleton-card">
        <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)">
          <div class="skeleton skeleton-avatar"></div>
          <div style="flex:1"><div class="skeleton skeleton-text" style="width:60%;margin-bottom:var(--space-2)"></div><div class="skeleton skeleton-text" style="width:40%;margin-bottom:0"></div></div>
        </div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:80%"></div>
        <div class="skeleton skeleton-text" style="width:55%"></div>
      </div>
    </div>
  </div></div>
  <pre class="code-block">&lt;!-- 텍스트 --&gt;
&lt;div class="skeleton skeleton-text" style="width:70%"&gt;&lt;/div&gt;

&lt;!-- 제목 --&gt;
&lt;div class="skeleton skeleton-title"&gt;&lt;/div&gt;

&lt;!-- 아바타 --&gt;
&lt;div class="skeleton skeleton-avatar"&gt;&lt;/div&gt;

&lt;!-- 썸네일 --&gt;
&lt;div class="skeleton skeleton-thumb"&gt;&lt;/div&gt;</pre>
</section>
